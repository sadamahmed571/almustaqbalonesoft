/* ===== System Detail Page ===== */
:root {

}
body { background: var(--color-bg-main); }

/* --- Nav --- */
.sys-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;

  display: flex; align-items: center; justify-content: space-between;

}
.sys-nav-back { display: inline-flex; align-items: center; gap: var(--space-xs); color: var(--color-neutral-300); text-decoration: none; font-weight: 500; font-size: var(--font-body); transition: color 0.3s; }

.sys-nav-brand { display: flex; align-items: center; gap: 10px; }

.sys-hero {

}
.sys-hero-bg-icon {

}
.sys-hero-content { position: relative; z-index: 1; max-width: 900px; }
.sys-hero-icon {

  font-size: 3rem; color: #fff; box-shadow: 0 20px 50px rgba(66, 189, 223, 0.25);
  animation: floatIcon 4s ease-in-out infinite;
}
@keyframes floatIcon { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
.sys-hero h1 { font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 900; color: #fff; margin-bottom: var(--space-xs); }
.sys-hero .sys-hero-sub { font-size: var(--font-body); color: var(--color-accent-300); font-weight: 600; margin-bottom: var(--space-md); letter-spacing: 1px; }
.sys-hero p { font-size: var(--font-body); color: var(--color-neutral-400); max-width: 700px; margin: 0 auto var(--space-lg); line-height: 1.9; }
.sys-kpis { display: flex; justify-content: center; gap: var(--space-md); flex-wrap: wrap; }
.sys-kpi {
  padding: var(--space-xs) var(--space-lg); border-radius: 50px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  color: var(--color-neutral-300); font-size: var(--font-small); font-weight: 500;
  display: inline-flex; align-items: center; gap: var(--space-xs); backdrop-filter: blur(10px);
}
.sys-kpi i { color: var(--color-accent-400); font-size: 0.9rem; }

.sys-stats {
  display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;
  padding: var(--space-xl) 2rem; background: var(--color-bg-alt);
  border-bottom: 1px solid var(--color-border-light);
}
.sys-stat { text-align: center; }
.sys-stat-num { font-size: 1.8rem; font-weight: 900; color: var(--color-primary-500); }
.sys-stat-label { font-size: var(--font-small); color: var(--color-text-muted); margin-top: 0.2rem; }

/* --- Section shared --- */
.sys-section { padding: var(--space-section) 2rem; }
.sys-section-alt { background: var(--color-bg-alt); }
.sys-section h2 { font-size: var(--font-title-h2); font-weight: 800; color: var(--color-text-main); margin-bottom: var(--space-sm); text-align: center; }

.sys-container { max-width: 1100px; margin: 0 auto; }

.sys-value-banner {

.sys-gallery { display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-md); }
.sys-gallery-item {

.sys-features { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: var(--space-md); }

.sys-feature-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--sys-gradient); transform: scaleX(0); transform-origin: right; transition: transform 0.4s ease;

.sys-feature-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); border-color: var(--color-accent-200); }

.sys-modules { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: var(--space-sm); }

.sys-footer a { color: var(--color-accent-400); text-decoration: none; }

/* --- Responsive --- */
@media (max-width: 768px) {

  .sys-details-wrap { grid-template-columns: 1fr; }
  .sys-stats { gap: 1.5rem; }
  .sys-nav { padding: 0 1rem; }

@media (max-width: 480px) {

  .sys-hero-icon { width: 72px; height: 72px; font-size: 2rem; }

  .sys-modules { grid-template-columns: 1fr; }
  .sys-value-banner { padding: var(--space-lg); }
  .sys-stat-num { font-size: 1.4rem; }

// ===== Render System Detail =====
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function renderSystem() {
  const id = getParam('id') || 'erp';
  const s = systemsData.find(sys => sys.id === id);
  if (!s) {
    document.getElementById('sysApp').innerHTML = '<div style="text-align:center;padding:6rem 2rem;color:var(--color-text-muted);"><h2>النظام غير موجود</h2><a href="index.html" class="btn-primary" style="margin-top:1rem;display:inline-flex;">العودة للرئيسية</a></div>';
    return;
  }

  document.title = `${s.title} — المستقبل ون سوفت`;
  document.getElementById('pageTitle').textContent = document.title;

  const galleryItems = [];
  for (let i = 1; i <= (s.screenshots || 3); i++) {
    const isHero = i === 1;
    const badges = ['لوحة التحكم الرئيسية', 'شاشة التقارير', 'إدارة المخزون', 'الشاشة الرئيسية', 'إعدادات النظام', 'تحليلات الأداء'];
    galleryItems.push(`
      <div class="sys-gallery-item${isHero ? '' : ''}">
        <div class="gallery-placeholder">
          <i class="bi ${['bi-display','bi-graph-up-arrow','bi-box-seam','bi-grid-3x3-gap','bi-sliders2','bi-bar-chart-line'][i-1]}"></i>
          <span>${badges[i-1] || `لقطة شاشة ${i}`}</span>
        </div>
        <span class="gallery-badge"><i class="bi bi-camera"></i> ${badges[i-1] || `شاشة ${i}`}</span>
      </div>
    `);
  }

  const app = document.getElementById('sysApp');
  app.innerHTML = `
    <!-- HERO -->
    <section class="sys-hero">
      <i class="bi ${s.icon} sys-hero-bg-icon"></i>
      <div class="sys-hero-content">
        <div class="sys-hero-icon"><i class="bi ${s.icon}"></i></div>
        <div class="sys-hero-sub">${s.subtitle}</div>
        <h1>${s.title}</h1>
        <p>${s.description}</p>
        <div class="sys-kpis">
          ${s.kpis.map(k => `<span class="sys-kpi"><i class="bi ${k.icon}"></i> ${k.text}</span>`).join('')}
        </div>
      </div>
    </section>

    <!-- STATS -->
    <div class="sys-stats">
      <div class="sys-stat"><div class="sys-stat-num">${s.modules.length}</div><div class="sys-stat-label">وحدة / نسخة</div></div>
      <div class="sys-stat"><div class="sys-stat-num">${s.features.length}</div><div class="sys-stat-label">ميزة تقنية</div></div>
      <div class="sys-stat"><div class="sys-stat-num">${Math.floor(Math.random() * 200 + 50)}+</div><div class="sys-stat-label">عميل نشط</div></div>
      <div class="sys-stat"><div class="sys-stat-num">99.9%</div><div class="sys-stat-label">نسبة التشغيل</div></div>
    </div>

    <!-- VALUE BANNER -->
    <div class="sys-section">
      <div class="sys-container">
        <div class="sys-value-banner">
          <i class="bi bi-quote"></i>
          <p><strong>💡 القيمة المضافة:</strong> ${s.value}</p>
        </div>

        <!-- SCREENSHOTS GALLERY -->
        <h2>لقطات من النظام</h2>
        <p class="sys-section-sub">واجهات حقيقية من نظام ${s.title} تعكس دقة التصميم وسلاسة التجربة</p>
        <div class="sys-gallery">
          ${galleryItems.join('')}
        </div>
      </div>
    </div>

    <!-- FEATURES -->
    <div class="sys-section sys-section-alt">
      <div class="sys-container">
        <h2>الميزات التقنية</h2>
        <p class="sys-section-sub">أبرز الإمكانيات التي تجعل من ${s.title} الخيار الأمثل لمؤسستك</p>
        <div class="sys-features">
          ${s.features.map(f => `

              <div class="feat-icon"><i class="bi ${['bi-lightning-charge','bi-arrow-repeat','bi-phone','bi-hdd-stack','bi-shield-check','bi-graph-up','bi-people','bi-gear','bi-truck','bi-clock','bi-wallet2','bi-bar-chart'][Math.floor(Math.random()*12)]}"></i></div>

    </div>

            </div>
          `).join('')}
        </div>

    </div>

      <div class="sys-container">

            <h2 style="text-align:right;">حول ${s.title}</h2>

            <ul>
              <li><i class="bi bi-check-circle-fill"></i> دعم فني متكامل على مدار الساعة</li>

              <li><i class="bi bi-check-circle-fill"></i> ضمان جودة واستقرار تام</li>

          <div class="sys-details-visual">

      <p>© 2026 <a href="index.html">المستقبل ون سوفت</a> — جميع الحقوق محفوظة.</p>
