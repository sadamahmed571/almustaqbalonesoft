<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>أداة معالجة النصوص العربية | Arabic Text Processor</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
   <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
   
   <style>
       :root {
           --bg-primary: #0a0a0f;
           --bg-secondary: #12121a;
           --bg-glass: rgba(20, 20, 35, 0.6);
           --bg-glass-hover: rgba(30, 30, 55, 0.7);
           --border-glass: rgba(255, 255, 255, 0.08);
           --border-glow: rgba(100, 200, 255, 0.15);
           --neon-blue: #00d4ff;
           --neon-purple: #a855f7;
           --neon-green: #22d3ee;
           --neon-pink: #f472b6;
           --neon-orange: #fb923c;
           --text-primary: #f1f5f9;
           --text-secondary: #94a3b8;
           --text-muted: #64748b;
           --success: #10b981;
           --warning: #f59e0b;
           --danger: #ef4444;
       }

       * {
           margin: 0;
           padding: 0;
           box-sizing: border-box;
       }

       body {
           font-family: 'Noto Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
           background: var(--bg-primary);
           color: var(--text-primary);
           min-height: 100vh;
           overflow-x: hidden;
           direction: rtl;
       }

       .bg-animation {
           position: fixed;
           top: 0;
           left: 0;
           width: 100%;
           height: 100%;
           z-index: -1;
           overflow: hidden;
       }

       .bg-animation::before {
           content: '';
           position: absolute;
           top: -50%;
           left: -50%;
           width: 200%;
           height: 200%;
           background: 
               radial-gradient(circle at 20% 80%, rgba(0, 212, 255, 0.03) 0%, transparent 50%),
               radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.03) 0%, transparent 50%),
               radial-gradient(circle at 50% 50%, rgba(34, 211, 238, 0.02) 0%, transparent 50%);
           animation: bgFloat 20s ease-in-out infinite;
       }

       @keyframes bgFloat {
           0%, 100% { transform: translate(0, 0) rotate(0deg); }
           33% { transform: translate(30px, -30px) rotate(1deg); }
           66% { transform: translate(-20px, 20px) rotate(-1deg); }
       }

       .grid-overlay {
           position: fixed;
           top: 0;
           left: 0;
           width: 100%;
           height: 100%;
           background-image: 
               linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px),
               linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
           background-size: 50px 50px;
           z-index: -1;
           pointer-events: none;
       }

       .header {
           padding: 20px 40px;
           display: flex;
           justify-content: space-between;
           align-items: center;
           border-bottom: 1px solid var(--border-glass);
           background: rgba(10, 10, 15, 0.8);
           backdrop-filter: blur(20px);
           position: sticky;
           top: 0;
           z-index: 100;
       }

       .logo {
           display: flex;
           align-items: center;
           gap: 12px;
       }

       .logo-icon {
           width: 42px;
           height: 42px;
           background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
           border-radius: 12px;
           display: flex;
           align-items: center;
           justify-content: center;
           font-size: 20px;
           color: white;
           box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
       }

       .logo-text {
           font-family: 'Noto Kufi Arabic', sans-serif;
           font-weight: 700;
           font-size: 1.3rem;
           background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
           -webkit-background-clip: text;
           -webkit-text-fill-color: transparent;
           background-clip: text;
       }

       .logo-sub {
           font-size: 0.75rem;
           color: var(--text-muted);
           margin-top: -2px;
       }

       .main-container {
           max-width: 1400px;
           margin: 0 auto;
           padding: 30px 20px;
       }

       .ad-space {
           width: 100%;
           height: 90px;
           background: var(--bg-glass);
           border: 1px dashed var(--border-glass);
           border-radius: 16px;
           display: flex;
           align-items: center;
           justify-content: center;
           margin-bottom: 30px;
           backdrop-filter: blur(10px);
           position: relative;
           overflow: hidden;
       }

       .ad-space::before {
           content: '';
           position: absolute;
           top: 0;
           left: 0;
           right: 0;
           bottom: 0;
           background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.03), transparent);
           animation: adShine 3s ease-in-out infinite;
       }

       @keyframes adShine {
           0% { transform: translateX(-100%); }
           100% { transform: translateX(100%); }
       }

       .ad-label {
           color: var(--text-muted);
           font-size: 0.85rem;
           z-index: 1;
       }

       .split-layout {
           display: grid;
           grid-template-columns: 1fr 1fr;
           gap: 24px;
           margin-bottom: 30px;
       }

       @media (max-width: 900px) {
           .split-layout {
               grid-template-columns: 1fr;
           }
       }

       .text-box-container {
           position: relative;
       }

       .text-box-header {
           display: flex;
           justify-content: space-between;
           align-items: center;
           margin-bottom: 12px;
           padding: 0 8px;
       }

       .text-box-title {
           font-size: 0.95rem;
           font-weight: 600;
           color: var(--text-secondary);
           display: flex;
           align-items: center;
           gap: 8px;
       }

       .text-box-title i {
           color: var(--neon-blue);
           font-size: 1.1rem;
       }

       .text-box-actions {
           display: flex;
           gap: 6px;
       }

       .icon-btn {
           width: 34px;
           height: 34px;
           border: 1px solid var(--border-glass);
           background: var(--bg-glass);
           color: var(--text-secondary);
           border-radius: 10px;
           cursor: pointer;
           display: flex;
           align-items: center;
           justify-content: center;
           transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
           font-size: 0.9rem;
           backdrop-filter: blur(10px);
       }

       .icon-btn:hover {
           background: var(--bg-glass-hover);
           color: var(--neon-blue);
           border-color: var(--border-glow);
           box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
           transform: translateY(-2px);
       }

       .icon-btn:active {
           transform: translateY(0);
       }

       .icon-btn.copied {
           background: rgba(16, 185, 129, 0.2);
           color: var(--success);
           border-color: var(--success);
       }

       .text-box {
           position: relative;
           background: var(--bg-glass);
           border: 1px solid var(--border-glass);
           border-radius: 20px;
           overflow: hidden;
           backdrop-filter: blur(20px);
           transition: all 0.3s ease;
       }

       .text-box:focus-within {
           border-color: var(--border-glow);
           box-shadow: 0 0 30px rgba(0, 212, 255, 0.08), inset 0 0 30px rgba(0, 212, 255, 0.02);
       }

       .text-box textarea {
           width: 100%;
           min-height: 280px;
           padding: 24px;
           background: transparent;
           border: none;
           color: var(--text-primary);
           font-family: 'Noto Sans Arabic', sans-serif;
           font-size: 1.1rem;
           line-height: 1.8;
           resize: vertical;
           outline: none;
           direction: rtl;
       }

       .text-box textarea::placeholder {
           color: var(--text-muted);
           opacity: 0.6;
       }

       .output-box {
           position: relative;
       }

       .output-box textarea {
           background: rgba(0, 212, 255, 0.02);
           font-family: 'Courier New', monospace;
           font-size: 1rem;
           line-height: 1.6;
           direction: ltr;
           text-align: left;
       }

       .floating-copy {
           position: absolute;
           bottom: 20px;
           left: 20px;
           background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
           color: white;
           border: none;
           padding: 12px 24px;
           border-radius: 50px;
           cursor: pointer;
           font-family: 'Noto Sans Arabic', sans-serif;
           font-size: 0.9rem;
           font-weight: 600;
           display: flex;
           align-items: center;
           gap: 8px;
           box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
           transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
           z-index: 10;
       }

       .floating-copy:hover {
           transform: translateY(-3px) scale(1.02);
           box-shadow: 0 8px 30px rgba(0, 212, 255, 0.4);
       }

       .floating-copy.copied {
           background: linear-gradient(135deg, var(--success), #059669);
           box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
       }

       .floating-copy.copied i {
           animation: checkBounce 0.5s ease;
       }

       @keyframes checkBounce {
           0% { transform: scale(0); }
           50% { transform: scale(1.3); }
           100% { transform: scale(1); }
       }

       .floating-panel {
           background: var(--bg-glass);
           border: 1px solid var(--border-glass);
           border-radius: 24px;
           padding: 24px;
           backdrop-filter: blur(20px);
           margin-bottom: 30px;
       }

       .panel-title {
           font-size: 1rem;
           font-weight: 700;
           margin-bottom: 20px;
           display: flex;
           align-items: center;
           gap: 10px;
           color: var(--text-primary);
       }

       .panel-title i {
           color: var(--neon-purple);
           font-size: 1.2rem;
       }

       .tools-grid {
           display: grid;
           grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
           gap: 12px;
       }

       .tool-btn {
           display: flex;
           align-items: center;
           gap: 12px;
           padding: 16px 20px;
           background: rgba(255, 255, 255, 0.03);
           border: 1px solid var(--border-glass);
           border-radius: 16px;
           color: var(--text-secondary);
           cursor: pointer;
           transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
           text-align: right;
           font-family: 'Noto Sans Arabic', sans-serif;
           font-size: 0.9rem;
           position: relative;
           overflow: hidden;
       }

       .tool-btn::before {
           content: '';
           position: absolute;
           top: 0;
           left: 0;
           width: 3px;
           height: 100%;
           background: linear-gradient(180deg, var(--neon-blue), var(--neon-purple));
           opacity: 0;
           transition: opacity 0.3s ease;
       }

       .tool-btn:hover {
           background: var(--bg-glass-hover);
           color: var(--text-primary);
           border-color: var(--border-glow);
           transform: translateX(-4px);
           box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
       }

       .tool-btn:hover::before {
           opacity: 1;
       }

       .tool-btn i {
           font-size: 1.3rem;
           width: 24px;
           text-align: center;
       }

       .tool-btn .tool-icon-blue { color: var(--neon-blue); }
       .tool-btn .tool-icon-purple { color: var(--neon-purple); }
       .tool-btn .tool-icon-green { color: var(--neon-green); }
       .tool-btn .tool-icon-pink { color: var(--neon-pink); }
       .tool-btn .tool-icon-orange { color: var(--neon-orange); }

       .lorem-section {
           background: var(--bg-glass);
           border: 1px solid var(--border-glass);
           border-radius: 24px;
           padding: 24px;
           backdrop-filter: blur(20px);
           margin-bottom: 30px;
       }

       .lorem-controls {
           display: flex;
           gap: 16px;
           margin-bottom: 20px;
           flex-wrap: wrap;
           align-items: center;
       }

       .lorem-select {
           background: rgba(255, 255, 255, 0.05);
           border: 1px solid var(--border-glass);
           border-radius: 12px;
           padding: 10px 16px;
           color: var(--text-primary);
           font-family: 'Noto Sans Arabic', sans-serif;
           font-size: 0.9rem;
           cursor: pointer;
           outline: none;
           min-width: 140px;
       }

       .lorem-select:focus {
           border-color: var(--border-glow);
       }

       .lorem-number {
           background: rgba(255, 255, 255, 0.05);
           border: 1px solid var(--border-glass);
           border-radius: 12px;
           padding: 10px 16px;
           color: var(--text-primary);
           font-family: 'Noto Sans Arabic', sans-serif;
           font-size: 0.9rem;
           width: 80px;
           text-align: center;
           outline: none;
       }

       .lorem-number:focus {
           border-color: var(--border-glow);
       }

       .lorem-btn {
           background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
           color: white;
           border: none;
           padding: 12px 28px;
           border-radius: 12px;
           cursor: pointer;
           font-family: 'Noto Sans Arabic', sans-serif;
           font-weight: 600;
           font-size: 0.9rem;
           transition: all 0.3s ease;
           display: flex;
           align-items: center;
           gap: 8px;
       }

       .lorem-btn:hover {
           transform: translateY(-2px);
           box-shadow: 0 8px 25px rgba(168, 85, 247, 0.3);
       }

       .lorem-output {
           background: rgba(0, 0, 0, 0.2);
           border: 1px solid var(--border-glass);
           border-radius: 16px;
           padding: 20px;
           min-height: 120px;
           color: var(--text-secondary);
           font-size: 0.95rem;
           line-height: 1.8;
           position: relative;
       }

       .lorem-output .copy-lorem {
           position: absolute;
           top: 12px;
           left: 12px;
       }

       .stats-bar {
           display: flex;
           gap: 20px;
           padding: 16px 24px;
           background: rgba(0, 0, 0, 0.2);
           border-top: 1px solid var(--border-glass);
           font-size: 0.8rem;
           color: var(--text-muted);
       }

       .stat-item {
           display: flex;
           align-items: center;
           gap: 6px;
       }

       .stat-item i {
           color: var(--neon-blue);
       }

       .toast {
           position: fixed;
           bottom: 30px;
           left: 50%;
           transform: translateX(-50%) translateY(100px);
           background: var(--bg-glass);
           border: 1px solid var(--border-glow);
           color: var(--text-primary);
           padding: 14px 28px;
           border-radius: 16px;
           font-size: 0.9rem;
           font-weight: 500;
           display: flex;
           align-items: center;
           gap: 10px;
           backdrop-filter: blur(20px);
           box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
           z-index: 1000;
           opacity: 0;
           transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
       }

       .toast.show {
           transform: translateX(-50%) translateY(0);
           opacity: 1;
       }

       .toast i {
           color: var(--success);
           font-size: 1.2rem;
       }

       ::-webkit-scrollbar {
           width: 8px;
       }

       ::-webkit-scrollbar-track {
           background: var(--bg-primary);
       }

       ::-webkit-scrollbar-thumb {
           background: var(--border-glass);
           border-radius: 4px;
       }

       ::-webkit-scrollbar-thumb:hover {
           background: var(--border-glow);
       }

       @media (max-width: 768px) {
           .header {
               padding: 15px 20px;
           }
           
           .main-container {
               padding: 20px 15px;
           }
           
           .tools-grid {
               grid-template-columns: 1fr;
           }
           
           .text-box textarea {
               min-height: 200px;
               padding: 16px;
           }
       }
   </style>
</head>
<body>
   <div class="bg-animation"></div>
   <div class="grid-overlay"></div>

   <header class="header">
       <div class="logo">
           <div class="logo-icon">
               <i class="bi bi-type-h1"></i>
           </div>
           <div>
               <div class="logo-text">معالج النصوص العربية</div>
               <div class="logo-sub">Arabic Text Processor for Designers</div>
           </div>
       </div>
       <div style="color: var(--text-muted); font-size: 0.8rem;">
           <i class="bi bi-moon-stars-fill" style="margin-left: 6px;"></i>
           v3.0
       </div>
   </header>

   <div class="main-container">
       <div class="ad-space">
           <span class="ad-label"><i class="bi bi-badge-ad" style="margin-left: 8px;"></i>مساحة إعلانية - Ad Space (728x90)</span>
       </div>

       <div class="split-layout">
           <div class="text-box-container">
               <div class="text-box-header">
                   <div class="text-box-title">
                       <i class="bi bi-input-cursor-text"></i>
                       النص الأصلي
                   </div>
                   <div class="text-box-actions">
                       <button class="icon-btn" id="copyInputBtn" onclick="copyInput()" title="نسخ">
                           <i class="bi bi-copy"></i>
                       </button>
                       <button class="icon-btn" onclick="pasteText()" title="لصق">
                           <i class="bi bi-clipboard-plus"></i>
                       </button>
                       <button class="icon-btn" onclick="clearInput()" title="مسح">
                           <i class="bi bi-trash3"></i>
                       </button>
                       <button class="icon-btn" onclick="selectAllInput()" title="تحديد الكل">
                           <i class="bi bi-check2-all"></i>
                       </button>
                   </div>
               </div>
               <div class="text-box">
                   <textarea id="inputText" placeholder="اكتب أو الصق النص العربي هنا...&#10;سيتم معالجته فوراً ليصبح جاهزاً للفوتوشوب" oninput="processText()"></textarea>
                   <div class="stats-bar">
                       <div class="stat-item">
                           <i class="bi bi-type"></i>
                           <span id="charCount">0 حرف</span>
                       </div>
                       <div class="stat-item">
                           <i class="bi bi-file-text"></i>
                           <span id="wordCount">0 كلمة</span>
                       </div>
                   </div>
               </div>
           </div>

           <div class="text-box-container">
               <div class="text-box-header">
                   <div class="text-box-title">
                       <i class="bi bi-magic"></i>
                       النتيجة المعالجة
                   </div>
                   <div class="text-box-actions">
                       <button class="icon-btn" onclick="copyOutput()" title="نسخ">
                           <i class="bi bi-copy"></i>
                       </button>
                       <button class="icon-btn" onclick="clearOutput()" title="مسح">
                           <i class="bi bi-trash3"></i>
                       </button>
                       <button class="icon-btn" onclick="selectAllOutput()" title="تحديد الكل">
                           <i class="bi bi-check2-all"></i>
                       </button>
                   </div>
               </div>
               <div class="text-box output-box">
                   <textarea id="outputText" readonly placeholder="النص المعالج سيظهر هنا...&#10;انسخه والصقه مباشرة في الفوتوشوب"></textarea>
                   <button class="floating-copy" id="copyBtn" onclick="copyOutput()">
                       <i class="bi bi-clipboard"></i>
                       <span>نسخ النتيجة</span>
                   </button>
               </div>
           </div>
       </div>

       <div class="floating-panel">
           <div class="panel-title">
               <i class="bi bi-tools"></i>
               أدوات المعالجة السريعة
           </div>
           <div class="tools-grid">
               <button class="tool-btn" onclick="convertToHindi()">
                   <i class="bi bi-123 tool-icon-blue"></i>
                   <span>تحويل للأرقام الهندية</span>
               </button>
               <button class="tool-btn" onclick="convertToArabic()">
                   <i class="bi bi-sort-numeric-down tool-icon-purple"></i>
                   <span>تحويل للأرقام العربية</span>
               </button>
               <button class="tool-btn" onclick="fixPunctuation()">
                   <i class="bi bi-braces tool-icon-green"></i>
                   <span>تصحيح الأقواس والترقيم</span>
               </button>
               <button class="tool-btn" onclick="removeTashkeel()">
                   <i class="bi bi-eraser tool-icon-pink"></i>
                   <span>إزالة التشكيل (الحركات)</span>
               </button>
               <button class="tool-btn" onclick="reverseText()">
                   <i class="bi bi-arrow-left-right tool-icon-orange"></i>
                   <span>عكس اتجاه النص</span>
               </button>
               <button class="tool-btn" onclick="removeExtraSpaces()">
                   <i class="bi bi-text-wrap tool-icon-blue"></i>
                   <span>إزالة المسافات الزائدة</span>
               </button>
           </div>
       </div>

       <div class="lorem-section">
           <div class="panel-title">
               <i class="bi bi-file-earmark-text"></i>
               مولد نصوص الحشو (Lorem Ipsum)
           </div>
           <div class="lorem-controls">
               <select class="lorem-select" id="loremLang">
                   <option value="arabic">عربي</option>
                   <option value="english">English</option>
               </select>
               <select class="lorem-select" id="loremType">
                   <option value="words">كلمات</option>
                   <option value="paragraphs">فقرات</option>
               </select>
               <input type="number" class="lorem-number" id="loremCount" value="50" min="1" max="500">
               <button class="lorem-btn" onclick="generateLorem()">
                   <i class="bi bi-lightning-charge-fill"></i>
                   توليد النص
               </button>
           </div>
           <div class="lorem-output" id="loremOutput">
               <button class="icon-btn copy-lorem" onclick="copyLorem()" title="نسخ">
                   <i class="bi bi-copy"></i>
               </button>
               <span style="color: var(--text-muted);">سيظهر النص هنا بعد التوليد...</span>
           </div>
       </div>

       <div class="ad-space">
           <span class="ad-label"><i class="bi bi-badge-ad" style="margin-left: 8px;"></i>مساحة إعلانية - Ad Space (728x90)</span>
       </div>
   </div>

   <div class="toast" id="toast">
       <i class="bi bi-check-circle-fill"></i>
       <span id="toastMsg">تم النسخ بنجاح!</span>
   </div>

   <script>
       // ========== Arabic Reshaper Engine ==========
       const ArabicReshaper = (function() {
           const ARABIC_LETTERS = {
               '\u0621': ['\uFE80', '\u0621', '\u0621', '\u0621'],
               '\u0622': ['\uFE81', '\uFE82', '\u0622', '\u0622'],
               '\u0623': ['\uFE83', '\uFE84', '\u0623', '\u0623'],
               '\u0624': ['\uFE85', '\uFE86', '\u0624', '\u0624'],
               '\u0625': ['\uFE87', '\uFE88', '\u0625', '\u0625'],
               '\u0626': ['\uFE89', '\uFE8A', '\uFE8B', '\uFE8C'],
               '\u0627': ['\uFE8D', '\uFE8E', '\u0627', '\u0627'],
               '\u0628': ['\uFE8F', '\uFE90', '\uFE91', '\uFE92'],
               '\u0629': ['\uFE93', '\uFE94', '\u0629', '\u0629'],
               '\u062A': ['\uFE95', '\uFE96', '\uFE97', '\uFE98'],
               '\u062B': ['\uFE99', '\uFE9A', '\uFE9B', '\uFE9C'],
               '\u062C': ['\uFE9D', '\uFE9E', '\uFE9F', '\uFEA0'],
               '\u062D': ['\uFEA1', '\uFEA2', '\uFEA3', '\uFEA4'],
               '\u062E': ['\uFEA5', '\uFEA6', '\uFEA7', '\uFEA8'],
               '\u062F': ['\uFEA9', '\uFEAA', '\u062F', '\u062F'],
               '\u0630': ['\uFEAB', '\uFEAC', '\u0630', '\u0630'],
               '\u0631': ['\uFEAD', '\uFEAE', '\u0631', '\u0631'],
               '\u0632': ['\uFEAF', '\uFEB0', '\u0632', '\u0632'],
               '\u0633': ['\uFEB1', '\uFEB2', '\uFEB3', '\uFEB4'],
               '\u0634': ['\uFEB5', '\uFEB6', '\uFEB7', '\uFEB8'],
               '\u0635': ['\uFEB9', '\uFEBA', '\uFEBB', '\uFEBC'],
               '\u0636': ['\uFEBD', '\uFEBE', '\uFEBF', '\uFEC0'],
               '\u0637': ['\uFEC1', '\uFEC2', '\uFEC3', '\uFEC4'],
               '\u0638': ['\uFEC5', '\uFEC6', '\uFEC7', '\uFEC8'],
               '\u0639': ['\uFEC9', '\uFECA', '\uFECB', '\uFECC'],
               '\u063A': ['\uFECD', '\uFECE', '\uFECF', '\uFED0'],
               '\u0641': ['\uFED1', '\uFED2', '\uFED3', '\uFED4'],
               '\u0642': ['\uFED5', '\uFED6', '\uFED7', '\uFED8'],
               '\u0643': ['\uFED9', '\uFEDA', '\uFEDB', '\uFEDC'],
               '\u0644': ['\uFEDD', '\uFEDE', '\uFEDF', '\uFEE0'],
               '\u0645': ['\uFEE1', '\uFEE2', '\uFEE3', '\uFEE4'],
               '\u0646': ['\uFEE5', '\uFEE6', '\uFEE7', '\uFEE8'],
               '\u0647': ['\uFEE9', '\uFEEA', '\uFEEB', '\uFEEC'],
               '\u0648': ['\uFEED', '\uFEEE', '\u0648', '\u0648'],
               '\u0649': ['\uFEEF', '\uFEF0', '\u0649', '\u0649'],
               '\u064A': ['\uFEF1', '\uFEF2', '\uFEF3', '\uFEF4'],
               '\u0671': ['\u0671', '\uFB51', '\u0671', '\u0671'],
               '\u067E': ['\uFB56', '\uFB57', '\uFB58', '\uFB59'],
               '\u0686': ['\uFB7A', '\uFB7B', '\uFB7C', '\uFB7D'],
               '\u06A4': ['\uFB6A', '\uFB6B', '\uFB6C', '\uFB6D'],
               '\u06AF': ['\uFB92', '\uFB93', '\uFB94', '\uFB95'],
               '\u06CC': ['\uFBFC', '\uFBFD', '\uFBFE', '\uFBFF'],
           };

           const HARAKAT = /[\u064B-\u065F\u0670\u0640]/g;
           const TATWEEL = /\u0640/g;

           function isArabicChar(char) {
               return ARABIC_LETTERS.hasOwnProperty(char);
           }

           function isRightJoining(char) {
               const code = char.charCodeAt(0);
               return (code >= 0x0621 && code <= 0x064A) || 
                      (code >= 0x0671 && code <= 0x06CC);
           }

           function reshape(text, options) {
               if (!text) return '';
               options = options || {};
               
               let result = [];
               let chars = text.split('');
               
               for (let i = 0; i < chars.length; i++) {
                   let char = chars[i];
                   
                   if (options.delete_harakat !== false && HARAKAT.test(char)) {
                       continue;
                   }
                   
                   if (options.delete_tatweel && TATWEEL.test(char)) {
                       continue;
                   }
                   
                   if (!isArabicChar(char)) {
                       result.push(char);
                       continue;
                   }
                   
                   let prevJoin = false;
                   let nextJoin = false;
                   
                   for (let j = i - 1; j >= 0; j--) {
                       if (HARAKAT.test(chars[j])) continue;
                       if (isRightJoining(chars[j]) && chars[j] !== '\u0621' && 
                           chars[j] !== '\u0622' && chars[j] !== '\u0623' &&
                           chars[j] !== '\u0624' && chars[j] !== '\u0625' &&
                           chars[j] !== '\u0627' && chars[j] !== '\u062F' &&
                           chars[j] !== '\u0630' && chars[j] !== '\u0631' &&
                           chars[j] !== '\u0632' && chars[j] !== '\u0648' &&
                           chars[j] !== '\u0649' && chars[j] !== '\u0671') {
                           prevJoin = true;
                       }
                       break;
                   }
                   
                   for (let j = i + 1; j < chars.length; j++) {
                       if (HARAKAT.test(chars[j])) continue;
                       if (isRightJoining(chars[j])) {
                           nextJoin = true;
                       }
                       break;
                   }
                   
                   let form = 0;
                   if (prevJoin && nextJoin) form = 3;
                   else if (prevJoin) form = 1;
                   else if (nextJoin) form = 2;
                   
                   const noInit = ['\u0621', '\u0622', '\u0623', '\u0624', '\u0625', 
                                  '\u0627', '\u062F', '\u0630', '\u0631', '\u0632', 
                                  '\u0648', '\u0649', '\u0671'];
                   if (noInit.includes(char) && form === 2) form = 0;
                   if (noInit.includes(char) && form === 3) form = 1;
                   
                   result.push(ARABIC_LETTERS[char][form]);
               }
               
               return result.join('');
           }

           return { reshape };
       })();

       // ========== Smart Word-By-Word Reverse Engine ==========
       // Keeps word order and line order, only reverses letters inside each word
       const SmartWordReverse = (function() {
           
           const BRACKET_PAIRS = {
               '(': ')',
               ')': '(',
               '[': ']',
               ']': '[',
               '{': '}',
               '}': '{',
               '\u00AB': '\u00BB',
               '\u00BB': '\u00AB',
               '\u201C': '\u201D',
               '\u201D': '\u201C',
               '\u2018': '\u2019',
               '\u2019': '\u2018',
           };
           
           // Check if character is a number (Arabic or English)
           function isNumber(char) {
               return /[0-9\u0660-\u0669]/.test(char);
           }
           
           // Check if character is a bracket
           function isBracket(char) {
               return /[()\[\]{}\u00AB\u00BB\u201C\u201D\u2018\u2019]/.test(char);
           }
           
           // Check if character is whitespace
           function isWhitespace(char) {
               return /\s/.test(char);
           }
           
           // Reverse a single word (letters only, keep numbers and brackets in place)
           function reverseWord(word) {
               if (!word) return '';
               
               let chars = word.split('');
               let result = new Array(chars.length);
               
               // Identify positions of numbers and brackets to keep
               let keepPositions = [];
               let reverseChars = [];
               
               for (let i = 0; i < chars.length; i++) {
                   if (isNumber(chars[i]) || isBracket(chars[i])) {
                       keepPositions.push({ index: i, char: chars[i] });
                   } else {
                       reverseChars.push(chars[i]);
                   }
               }
               
               // Fill result array
               let revIndex = reverseChars.length - 1;
               for (let i = 0; i < chars.length; i++) {
                   let isKept = false;
                   for (let k = 0; k < keepPositions.length; k++) {
                       if (keepPositions[k].index === i) {
                           // Swap bracket direction
                           let ch = keepPositions[k].char;
                           result[i] = BRACKET_PAIRS[ch] || ch;
                           isKept = true;
                           break;
                       }
                   }
                   if (!isKept && revIndex >= 0) {
                       result[i] = reverseChars[revIndex];
                       revIndex--;
                   }
               }
               
               return result.join('');
           }
           
           // Main function: process text line by line, word by word
           function processText(text) {
               if (!text) return '';
               
               // Split into lines (preserve line order)
               let lines = text.split('\n');
               let processedLines = [];
               
               for (let lineIdx = 0; lineIdx < lines.length; lineIdx++) {
                   let line = lines[lineIdx];
                   if (!line.trim()) {
                       processedLines.push(line);
                       continue;
                   }
                   
                   // Split line into words by spaces (preserve word order)
                   let words = line.split(/(\s+)/);
                   let processedWords = [];
                   
                   for (let w = 0; w < words.length; w++) {
                       let word = words[w];
                       if (isWhitespace(word)) {
                           processedWords.push(word);
                       } else if (word) {
                           let reshaped = ArabicReshaper.reshape(word, { delete_harakat: false });
                           let reversed = reverseWord(reshaped);
                           processedWords.push(reversed);
                       }
                   }
                   
                   processedLines.push(processedWords.join(''));
               }
               
               return processedLines.join('\n');
           }
           
           return { processText };
       })();

       // ========== Main Application Logic ==========
       
       const inputText = document.getElementById('inputText');
       const outputText = document.getElementById('outputText');
       const copyBtn = document.getElementById('copyBtn');
       const copyInputBtn = document.getElementById('copyInputBtn');
       const toast = document.getElementById('toast');
       const toastMsg = document.getElementById('toastMsg');

       function showToast(message) {
           toastMsg.textContent = message;
           toast.classList.add('show');
           setTimeout(function() {
               toast.classList.remove('show');
           }, 2500);
       }

       function updateStats() {
           var text = inputText.value;
           var charCount = text.length;
           var wordCount = text.trim() ? text.trim().split(/\s+/).length : 0;
           document.getElementById('charCount').textContent = charCount + ' حرف';
           document.getElementById('wordCount').textContent = wordCount + ' كلمة';
       }

       function processText() {
           var text = inputText.value;
           updateStats();
           
           if (!text) {
               outputText.value = '';
               return;
           }
           
           var result = SmartWordReverse.processText(text);
           outputText.value = result;
       }

       function pasteText() {
           navigator.clipboard.readText().then(function(text) {
               inputText.value = text;
               processText();
               showToast('تم اللصق من الحافظة');
           }).catch(function(err) {
               showToast('تعذر الوصول للحافظة - الصق يدوياً');
           });
       }

       function copyInput() {
           if (!inputText.value) {
               showToast('لا يوجد نص للنسخ');
               return;
           }
           inputText.select();
           document.execCommand('copy');
           
           copyInputBtn.classList.add('copied');
           copyInputBtn.innerHTML = '<i class="bi bi-check-lg"></i>';
           showToast('تم نسخ النص الأصلي');
           
           setTimeout(function() {
               copyInputBtn.classList.remove('copied');
               copyInputBtn.innerHTML = '<i class="bi bi-copy"></i>';
           }, 2000);
       }

       function clearInput() {
           inputText.value = '';
           processText();
           showToast('تم مسح النص');
       }

       function selectAllInput() {
           inputText.select();
           showToast('تم تحديد النص');
       }

       function copyOutput() {
           if (!outputText.value) {
               showToast('لا يوجد نص للنسخ');
               return;
           }
           outputText.select();
           document.execCommand('copy');
           
           copyBtn.classList.add('copied');
           copyBtn.innerHTML = '<i class="bi bi-check-lg"></i><span>تم النسخ!</span>';
           showToast('تم نسخ النص المعالج');
           
           setTimeout(function() {
               copyBtn.classList.remove('copied');
               copyBtn.innerHTML = '<i class="bi bi-clipboard"></i><span>نسخ النتيجة</span>';
           }, 2000);
       }

       function clearOutput() {
           outputText.value = '';
           showToast('تم مسح النتيجة');
       }

       function selectAllOutput() {
           outputText.select();
           showToast('تم تحديد النتيجة');
       }

       function convertToHindi() {
           var text = inputText.value;
           if (!text) return;
           
           var arabicToHindi = {
               '0': '\u0660', '1': '\u0661', '2': '\u0662', '3': '\u0663', '4': '\u0664',
               '5': '\u0665', '6': '\u0666', '7': '\u0667', '8': '\u0668', '9': '\u0669'
           };
           
           inputText.value = text.replace(/[0-9]/g, function(d) { return arabicToHindi[d] || d; });
           processText();
           showToast('تم تحويل الأرقام للهندية');
       }

       function convertToArabic() {
           var text = inputText.value;
           if (!text) return;
           
           var hindiToArabic = {
               '\u0660': '0', '\u0661': '1', '\u0662': '2', '\u0663': '3', '\u0664': '4',
               '\u0665': '5', '\u0666': '6', '\u0667': '7', '\u0668': '8', '\u0669': '9'
           };
           
           inputText.value = text.replace(/[\u0660-\u0669]/g, function(d) { return hindiToArabic[d] || d; });
           processText();
           showToast('تم تحويل الأرقام للعربية');
       }

       function fixPunctuation() {
           var text = inputText.value;
           if (!text) return;
           
           var fixed = text;
           fixed = fixed.replace(/\(/g, '\u200E(').replace(/\)/g, '\u200E)');
           fixed = fixed.replace(/\[/g, '\u200E[').replace(/\]/g, '\u200E]');
           fixed = fixed.replace(/\?/g, '\u061F');
           
           inputText.value = fixed;
           processText();
           showToast('تم تصحيح علامات الترقيم');
       }

       function removeTashkeel() {
           var text = inputText.value;
           if (!text) return;
           
           var tashkeel = /[\u064B-\u065F\u0670\u0640]/g;
           inputText.value = text.replace(tashkeel, '');
           processText();
           showToast('تم إزالة التشكيل');
       }

       function reverseText() {
           var text = inputText.value;
           if (!text) return;
           
           var rev = [];
           for (var i = text.length - 1; i >= 0; i--) {
               rev.push(text[i]);
           }
           inputText.value = rev.join('');
           processText();
           showToast('تم عكس النص');
       }

       function removeExtraSpaces() {
           var text = inputText.value;
           if (!text) return;
           
           inputText.value = text.replace(/\s+/g, ' ').trim();
           processText();
           showToast('تم إزالة المسافات الزائدة');
       }

       var arabicWords = [
           'التصميم', 'الفن', 'الإبداع', 'الألوان', 'الخطوط', 'الرسوم', 'الصور', 'الأفكار',
           'المستقبل', 'التقنية', 'الرقمية', 'الطباعة', 'التواصل', 'الفكرة', 'الرؤية', 'الجمال',
           'الهوية', 'الشعار', 'العلامة', 'التجارية', 'المحتوى', 'الرسالة', 'الهدف', 'النجاح',
           'الابتكار', 'التطوير', 'التحسين', 'الجودة', 'الدقة', 'الاحترافية', 'التميز', 'الإتقان'
       ];

       var englishWords = [
           'design', 'creative', 'art', 'color', 'typography', 'image', 'idea', 'vision',
           'future', 'digital', 'technology', 'print', 'brand', 'logo', 'identity', 'content',
           'message', 'goal', 'success', 'innovation', 'development', 'quality', 'precision',
           'professional', 'excellence', 'mastery', 'modern', 'elegant', 'stunning', 'beautiful'
       ];

       function generateLorem() {
           var lang = document.getElementById('loremLang').value;
           var type = document.getElementById('loremType').value;
           var count = parseInt(document.getElementById('loremCount').value) || 50;
           var words = lang === 'arabic' ? arabicWords : englishWords;
           
           var result = '';
           
           if (type === 'words') {
               for (var i = 0; i < count; i++) {
                   result += words[Math.floor(Math.random() * words.length)] + ' ';
               }
               result = result.trim();
           } else {
               var wordsPerPara = 40;
               var paraCount = count;
               for (var p = 0; p < paraCount; p++) {
                   var para = '';
                   for (var i = 0; i < wordsPerPara; i++) {
                       para += words[Math.floor(Math.random() * words.length)] + ' ';
                   }
                   result += para.trim() + '\n\n';
               }
               result = result.trim();
           }
           
           var processed = SmartWordReverse.processText(result);
           
           var outputDiv = document.getElementById('loremOutput');
           outputDiv.innerHTML = '<button class="icon-btn copy-lorem" onclick="copyLorem()" title="نسخ"><i class="bi bi-copy"></i></button><div style="white-space: pre-wrap; direction: ltr; text-align: left; font-family: monospace;">' + processed + '</div>';
           outputDiv.dataset.rawText = processed;
           
           showToast('تم توليد النص بنجاح');
       }

       function copyLorem() {
           var outputDiv = document.getElementById('loremOutput');
           var text = outputDiv.dataset.rawText || '';
           if (!text) {
               showToast('لا يوجد نص للنسخ');
               return;
           }
           
           navigator.clipboard.writeText(text).then(function() {
               showToast('تم نسخ نص Lorem Ipsum');
           });
       }

       processText();
